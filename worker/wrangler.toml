name = "asor-digital-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# CORS allowed origins (comma-separated). Public — not a secret.
[vars]
CORS_ORIGINS = "https://asor-law.com,https://www.asor-law.com,http://localhost:8080"
SUMIT_API_BASE = "https://api.sumit.co.il"
PRODUCT_RENTAL_PRICE = "500"
PRODUCT_RENTAL_NAME = "הסכם שכירות דירת מגורים"
RETURN_URL_BASE = "https://asor-law.com"
OFFICE_EMAIL = "office@asor-law.com"
EMAIL_FROM = "Asor Digital <noreply@asor-law.com>"

# KV namespace for orders (one row per order, keyed by orderId).
# Run once:  npx wrangler kv namespace create ORDERS_KV
#            npx wrangler kv namespace create ORDERS_KV --preview
# Paste the IDs returned below.
[[kv_namespaces]]
binding = "ORDERS_KV"
id = "5c4dae6da374471a962c3742508b9e79"
preview_id = "a3aaa091ea234d2eab645bc03f4eef7f"

# Secrets are set via:
#   npx wrangler secret put SUMIT_COMPANY_ID
#   npx wrangler secret put SUMIT_API_KEY
#   npx wrangler secret put RESEND_API_KEY
# (not stored in this file)

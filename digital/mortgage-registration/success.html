<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://asor-digital-api.israel-486.workers.dev; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
    <title>תשלום התקבל | רישום משכנתא | עשור ושות׳</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="../../images/logo-mark.png" type="image/png">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../rental-agreement/form.css">
    <style>
        .success-card {
            max-width: 640px; margin: 64px auto; background: #fff;
            border: 1px solid var(--gold-soft, #e8dfd2); border-radius: 12px;
            padding: 48px 40px; text-align: center;
            box-shadow: 0 4px 24px rgba(122, 92, 62, 0.08);
        }
        .success-icon {
            width: 72px; height: 72px; margin: 0 auto 24px;
            background: #e8f5e9; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .success-icon svg { width: 40px; height: 40px; color: #2e7d32; }
        .success-card h1 { font-size: 28px; color: var(--gold-dark, #7a5c3e); margin: 0 0 12px; }
        .success-card p { color: var(--ink-soft, #7c6a55); line-height: 1.7; margin: 0 0 12px; }
        .success-meta {
            margin-top: 32px; padding-top: 24px;
            border-top: 1px solid var(--gold-soft, #e8dfd2); font-size: 14px;
        }
        .success-meta strong { color: var(--gold-dark, #7a5c3e); }
        .success-actions { margin-top: 32px; }
        .success-error { color: #c62828; background: #ffebee; padding: 12px 16px; border-radius: 6px; margin-top: 16px; }
    </style>
</head>
<body class="form-body">
    <header class="form-header">
        <div class="container">
            <a href="../../" class="form-logo">
                <img src="../../images/logo-he.png" alt="עשור ושות׳ - עורכי דין">
            </a>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="success-card">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h1>תשלום התקבל בהצלחה</h1>
                <p id="msg">מעדכן את ההזמנה...</p>
                <div class="success-meta" id="meta" style="display:none;">
                    <p><strong>מס׳ הזמנה:</strong> <span id="orderIdDisplay">—</span></p>
                    <p>אישור הזמנה נשלח אליך במייל. נחזור אליך תוך 24 שעות עסקים.</p>
                    <p>חשבונית מס/קבלה תישלח אוטומטית.</p>
                </div>
                <div id="errorBox" class="success-error" style="display:none;"></div>
                <div class="success-actions">
                    <a href="../../" class="form-btn form-btn-primary">חזרה לאתר הראשי</a>
                </div>
            </div>
        </div>
    </main>
    <footer class="form-footer">
        <div class="container">
            <p>שאלות? <a href="mailto:office@asor-law.com">office@asor-law.com</a> · 02-500-0275</p>
        </div>
    </footer>
    <script>
        (function() {
            const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
                ? 'http://localhost:8787'
                : 'https://asor-digital-api.israel-486.workers.dev';
            const params = new URLSearchParams(location.search);
            const orderId = params.get('orderId');
            const msg = document.getElementById('msg');
            const meta = document.getElementById('meta');
            const idDisp = document.getElementById('orderIdDisplay');
            const errBox = document.getElementById('errorBox');
            if (!orderId) {
                msg.textContent = '';
                errBox.style.display = 'block';
                errBox.textContent = 'לא נמצא מזהה הזמנה. אם בוצע תשלום — צרו קשר עם המשרד.';
                return;
            }
            idDisp.textContent = orderId;
            fetch(API_BASE + '/api/orders/' + encodeURIComponent(orderId) + '/payment-callback', { method: 'POST' })
                .then(r => r.json().then(j => ({ ok: r.ok, json: j })))
                .then(({ ok, json }) => {
                    if (!ok) throw new Error(json.error || 'Callback failed');
                    msg.textContent = 'תודה! ההזמנה נרשמה במערכת.';
                    meta.style.display = 'block';
                })
                .catch(err => {
                    msg.textContent = 'התשלום עבר, אבל נתקלנו בבעיה בעדכון ההזמנה. צרו קשר עם המשרד עם מספר ההזמנה.';
                    errBox.style.display = 'block';
                    errBox.textContent = err.message || 'שגיאה';
                    meta.style.display = 'block';
                });
        })();
    </script>
</body>
</html>
